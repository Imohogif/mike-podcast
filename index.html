<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MIKE — AI Podcast Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C9A84C;--gold-l:#E8C97A;--gold-dim:rgba(201,168,76,.15);
  --bg:#080808;--bg2:#0f0f0f;--bg3:#181818;
  --txt:#F0EDE6;--muted:#6B6459;--border:rgba(201,168,76,.15);--red:#FF4444;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--txt);overflow-x:hidden}
.screen{display:none}
.screen.active{display:flex;flex-direction:column;min-height:100vh}

/* ══ WELCOME ══ */
#s-welcome{align-items:center;justify-content:center;padding:2rem 1.25rem;gap:1.5rem;overflow-y:auto;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.06),transparent 70%)}
.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:.5rem}
.mic-ring{width:72px;height:72px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;animation:pls 3s ease-in-out infinite}
.mic-ring svg{width:32px;height:32px;fill:var(--gold)}
@keyframes pls{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.4)}50%{box-shadow:0 0 0 18px rgba(201,168,76,.04)}}
.brand{font-family:'Playfair Display',serif;font-size:3rem;font-weight:900;letter-spacing:-.02em}
.brand-sub{font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:1.75rem 1.5rem;width:100%;max-width:440px;position:relative}
.card::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:50%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.card h2{font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:.5rem;text-align:center}
.card p{color:var(--muted);font-size:.875rem;line-height:1.7;text-align:center;margin-bottom:1.5rem}
.lang-row{display:flex;gap:.5rem;margin-bottom:1.2rem}
.lang-btn{flex:1;padding:.6rem;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:.875rem;cursor:pointer;transition:all .2s}
.lang-btn.on{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);font-weight:600}
.field-lbl{font-size:.78rem;color:var(--muted);margin-bottom:.3rem;display:block}
.field{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:11px;padding:.8rem 1rem;color:var(--txt);font-family:'Tajawal',sans-serif;font-size:1rem;outline:none;transition:border-color .2s;margin-bottom:1.1rem}
.field:focus{border-color:var(--gold)}.field::placeholder{color:var(--muted)}
.btn{width:100%;padding:.9rem;background:linear-gradient(135deg,var(--gold),var(--gold-l));border:none;border-radius:11px;color:#0A0A0A;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,168,76,.25)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ══ TOPICS ══ */
#s-topics{padding:1.5rem 1.25rem 2rem;gap:1.2rem;overflow-y:auto}
.topics-top{text-align:center}
.sec-eye{font-size:.7rem;color:var(--gold);letter-spacing:.2em;text-transform:uppercase;margin-bottom:.4rem}
.sec-h{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700}
.sec-p{color:var(--muted);font-size:.85rem;margin-top:.3rem}
.cats{display:grid;grid-template-columns:repeat(2,1fr);gap:.7rem}
.cat{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1rem;cursor:pointer;transition:all .2s;text-align:right}
.cat:active{transform:scale(.97)}.cat.on{border-color:var(--gold);background:var(--gold-dim)}
.cat-emoji{font-size:1.6rem;margin-bottom:.3rem;display:block}
.cat-name{font-size:.9rem;font-weight:600;margin-bottom:.15rem;color:var(--txt)}
.cat-desc{font-size:.72rem;color:var(--muted);line-height:1.45}
.subs{display:none}.subs.show{display:block}
.subs-lbl{font-size:.7rem;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;margin-bottom:.5rem}
.chips{display:flex;flex-wrap:wrap;gap:.4rem}
.chip{padding:.42rem .85rem;border-radius:100px;border:1px solid var(--border);background:var(--bg2);color:var(--muted);font-family:'Tajawal',sans-serif;font-size:.8rem;cursor:pointer;transition:all .18s}
.chip:active{transform:scale(.95)}.chip.on{background:var(--gold);border-color:var(--gold);color:#0A0A0A;font-weight:600}

/* ══════════════════════════════
   STUDIO SCREEN
══════════════════════════════ */
#s-studio{height:100vh;min-height:unset;position:fixed;inset:0;overflow:hidden;display:flex;flex-direction:column}

.prog-bar{height:2px;background:#0a0a0a;flex-shrink:0}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-l));transition:width .6s;width:0%}

/* THE ROOM */
.room{
  flex:1;position:relative;overflow:hidden;
  background:linear-gradient(180deg,#1a0e05 0%,#2d1a08 35%,#1a0e05 100%);
}

/* Ceiling */
.ceiling{
  position:absolute;top:0;left:0;right:0;height:18%;
  background:linear-gradient(180deg,#0d0804,#1a1005);
}
/* Ceiling light strip */
.ceiling-light{
  position:absolute;top:0;left:10%;right:10%;height:3px;
  background:linear-gradient(90deg,transparent,rgba(255,220,120,.15),rgba(255,220,120,.3),rgba(255,220,120,.15),transparent);
  box-shadow:0 0 40px 10px rgba(255,200,80,.08);
}

/* Back wall — warm brick/plaster */
.back-wall{
  position:absolute;top:0;left:0;right:0;bottom:35%;
  background:
    linear-gradient(180deg,#1a0d04 0%,#2a1508 40%,#1e1006 100%);
  overflow:hidden;
}
/* Wall texture lines */
.back-wall::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(0,0,0,.08) 28px,rgba(0,0,0,.08) 30px),
             repeating-linear-gradient(90deg,transparent,transparent 58px,rgba(0,0,0,.06) 58px,rgba(0,0,0,.06) 60px);
}
/* Warm ambient glow on wall */
.back-wall::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 60%,rgba(255,160,40,.08) 0%,transparent 65%);
}

/* Curtain right */
.curtain{
  position:absolute;top:0;right:0;width:22%;bottom:35%;
  background:linear-gradient(90deg,transparent,#8B4A10,#7A3D0A,#6B3408);
  opacity:.85;
}
.curtain::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(180deg,transparent,transparent 18px,rgba(0,0,0,.06) 18px,rgba(0,0,0,.06) 20px);
}
/* Curtain fold shadows */
.curtain::after{
  content:'';position:absolute;top:0;left:0;bottom:0;width:40%;
  background:linear-gradient(90deg,rgba(0,0,0,.4),transparent);
}

/* Decorative items on back shelf */
.back-shelf{
  position:absolute;top:12%;left:5%;width:30%;height:3px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.2),rgba(201,168,76,.3),transparent);
}
.shelf-items{
  position:absolute;top:0;left:0;right:0;
  transform:translateY(-100%);
  display:flex;gap:8px;align-items:flex-end;padding:0 4px;
}

/* Piano */
.piano{
  position:absolute;top:8%;right:6%;width:18%;
  display:flex;flex-direction:column;align-items:center;
}
.piano-lid{
  width:100%;height:0;border-left:4px solid #1a1a1a;border-right:4px solid #1a1a1a;
  border-top:18px solid #111;
  border-radius:2px 8px 0 0;transform:skewX(-8deg);
  box-shadow:2px -2px 8px rgba(0,0,0,.5);
}
.piano-body{width:95%;height:30px;background:linear-gradient(180deg,#111,#0a0a0a);border-radius:0 0 4px 4px;box-shadow:0 4px 12px rgba(0,0,0,.6)}
.piano-keys{width:90%;height:8px;background:repeating-linear-gradient(90deg,#f5f5f5 0px,#f5f5f5 5px,#111 5px,#111 7px);border-radius:0 0 3px 3px;opacity:.7}
/* Piano candles */
.candles{position:absolute;top:-25px;right:-10px;display:flex;gap:4px}
.candle{display:flex;flex-direction:column;align-items:center}
.flame{width:3px;height:7px;background:linear-gradient(to top,#ff8800,#ffdd00,#fff);border-radius:50% 50% 20% 20%;animation:flicker .5s ease-in-out infinite alternate;filter:blur(.5px)}
@keyframes flicker{from{transform:scaleX(1) rotate(-2deg)}to{transform:scaleX(.8) rotate(2deg) scaleY(1.1)}}
.candle-body{width:4px;height:14px;background:linear-gradient(90deg,#e8d5b5,#d4c09a);border-radius:2px}

/* Wood floor */
.floor{
  position:absolute;bottom:0;left:0;right:0;height:38%;
  background:linear-gradient(180deg,#3d2008 0%,#2d1808 40%,#1e1005 100%);
  overflow:hidden;
}
/* Herringbone wood pattern */
.floor::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 12px,rgba(0,0,0,.08) 12px,rgba(0,0,0,.08) 14px),
             repeating-linear-gradient(-45deg,transparent,transparent 12px,rgba(201,168,76,.03) 12px,rgba(201,168,76,.03) 14px);
}
.floor::after{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(180deg,rgba(0,0,0,.5),transparent);
}
/* Floor reflection glow */
.floor-glow{
  position:absolute;bottom:0;left:15%;right:15%;height:50%;
  background:radial-gradient(ellipse at 50% 100%,rgba(180,100,20,.12),transparent 70%);
}

/* Persian rug */
.rug{
  position:absolute;bottom:12%;left:50%;transform:translateX(-50%);
  width:52%;height:22%;
  background:
    linear-gradient(135deg,#5a1a1a 0%,#3d1010 25%,#6b2020 50%,#3d1010 75%,#5a1a1a 100%);
  border-radius:4px;
  box-shadow:0 2px 20px rgba(0,0,0,.4);
  overflow:hidden;
}
.rug::before{
  content:'';position:absolute;inset:4px;
  border:2px solid rgba(201,168,76,.25);border-radius:3px;
}
.rug::after{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 50% 50%,rgba(201,168,76,.1) 20%,transparent 60%),
    repeating-linear-gradient(45deg,transparent,transparent 6px,rgba(0,0,0,.06) 6px,rgba(0,0,0,.06) 8px);
}

/* CHAIRS */
.chair{
  position:absolute;bottom:28%;
  width:110px;
  display:flex;flex-direction:column;align-items:center;
  transition:all .5s ease;
}
.chair-host{left:12%;transform:translateX(-50%)}
.chair-guest{right:12%;transform:translateX(50%)}

/* Chair SVG */
.chair-svg{width:110px;height:80px;position:relative}

/* Spotlight on active chair */
.chair-spot{
  position:absolute;top:-80px;left:50%;transform:translateX(-50%);
  width:120px;height:100px;
  background:conic-gradient(from 165deg at 50% 0%,transparent,rgba(255,220,100,.06) 30deg,transparent);
  opacity:0;transition:opacity .5s;pointer-events:none;
}
.chair.speaking .chair-spot{opacity:1}

/* Character sitting on chair */
.char-figure{
  position:absolute;bottom:55px;left:50%;transform:translateX(-50%);
  width:70px;
  transition:all .3s;
}
.chair.speaking .char-figure{filter:drop-shadow(0 0 12px rgba(201,168,76,.2))}

/* Talking animation */
.char-figure.talking{animation:sit-talk .25s ease-in-out infinite alternate}
@keyframes sit-talk{from{transform:translateX(-50%) translateY(0)}to{transform:translateX(-50%) translateY(-2px)}}

/* Microphone stand next to chair */
.mic-arm{
  position:absolute;bottom:68px;
  width:3px;height:50px;
  background:linear-gradient(to bottom,#555,#333);
}
.chair-host .mic-arm{right:-18px;transform:rotate(-8deg);transform-origin:bottom}
.chair-guest .mic-arm{left:-18px;transform:rotate(8deg);transform-origin:bottom}
.mic-head{
  position:absolute;top:-6px;left:50%;transform:translateX(-50%);
  width:10px;height:10px;border-radius:50%;
  background:radial-gradient(circle,#888,#444);
  box-shadow:0 0 4px rgba(201,168,76,.2);
}
.mic-base{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:16px;height:4px;
  background:linear-gradient(90deg,#333,#555,#333);
  border-radius:2px;
}

/* Character name */
.char-label{
  position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);
  font-size:.68rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;
  background:rgba(0,0,0,.55);padding:.18rem .55rem;border-radius:100px;
  border:1px solid rgba(201,168,76,.1);white-space:nowrap;
  transition:all .3s;
}
.chair.speaking .char-label{color:var(--gold);border-color:rgba(201,168,76,.35)}

/* Mouth/speaking indicator */
.speak-dots{
  position:absolute;top:-8px;left:50%;transform:translateX(-50%);
  display:flex;gap:2px;opacity:0;transition:opacity .2s;
}
.chair.speaking .speak-dots{opacity:1}
.speak-dots span{
  width:3px;border-radius:2px;background:var(--gold);
  animation:sd .4s ease-in-out infinite alternate;
}
.speak-dots span:nth-child(1){height:4px;animation-delay:0s}
.speak-dots span:nth-child(2){height:7px;animation-delay:.1s}
.speak-dots span:nth-child(3){height:5px;animation-delay:.2s}
@keyframes sd{from{transform:scaleY(.4)}to{transform:scaleY(1)}}

/* Side table */
.side-table{
  position:absolute;bottom:29%;
  width:28px;height:28px;
}
.side-table-host{left:calc(12% + 52px);transform:translateX(-50%)}
.side-table-guest{right:calc(12% + 52px);transform:translateX(50%)}
.side-table-top{width:28px;height:5px;background:linear-gradient(180deg,#5a3515,#3d2208);border-radius:3px;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.side-table-leg{width:3px;height:18px;background:#2d1808;margin:0 auto;border-radius:2px}
.coffee-cup{font-size:.75rem;margin-bottom:1px}

/* HUD overlay */
.hud{
  position:absolute;top:0;left:0;right:0;
  padding:.5rem .85rem;display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent);
  pointer-events:none;
}
.live-pill{display:flex;align-items:center;gap:.3rem;background:rgba(255,68,68,.15);border:1px solid rgba(255,68,68,.35);border-radius:100px;padding:.2rem .6rem;font-size:.65rem;font-weight:700;color:var(--red)}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:blink 1.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.ep-info{font-size:.72rem;color:rgba(255,255,255,.5);text-align:center}
.ep-info b{color:rgba(255,220,120,.8)}
.q-badge{font-size:.68rem;color:var(--muted);background:rgba(0,0,0,.45);padding:.18rem .5rem;border-radius:100px;border:1px solid var(--border)}

/* ══ BOTTOM CONTROLS ══ */
.studio-foot{
  flex-shrink:0;
  background:linear-gradient(to top,rgba(5,3,1,.98) 70%,transparent);
  padding:.5rem 1rem .75rem;
}
.transcript{
  background:rgba(10,8,5,.8);border:1px solid rgba(201,168,76,.1);border-radius:12px;
  padding:.55rem .9rem;min-height:44px;max-height:72px;overflow-y:auto;
  margin-bottom:.45rem;font-size:.85rem;line-height:1.6;
  backdrop-filter:blur(6px);
}
.transcript::-webkit-scrollbar{width:0}
.t-host{color:#f0ede6}.t-guest{color:var(--gold)}.t-hint{color:var(--muted);font-style:italic;font-size:.78rem}
.status{text-align:center;font-size:.7rem;color:var(--muted);margin-bottom:.4rem;min-height:13px}
.ctrl-row{display:flex;align-items:center;justify-content:center;gap:.7rem}

.big-mic{
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  border:none;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;box-shadow:0 4px 18px rgba(201,168,76,.22);position:relative;flex-shrink:0;
}
.big-mic svg{width:23px;height:23px;fill:#0A0A0A;position:relative;z-index:1;transition:opacity .15s}
.big-mic.host-talking{background:linear-gradient(135deg,#1c1c1c,#2a2a2a);box-shadow:none}
.big-mic.host-talking::after{content:'⏸';position:absolute;font-size:1.2rem;color:var(--gold)}
.big-mic.host-talking svg{opacity:0}
.big-mic.listening{background:linear-gradient(135deg,#991111,#EE3333);animation:mpulse 1s ease-out infinite}
.big-mic.waiting{opacity:.38;cursor:not-allowed}
@keyframes mpulse{0%{box-shadow:0 0 0 0 rgba(255,68,68,.5)}70%{box-shadow:0 0 0 12px rgba(255,68,68,0)}100%{box-shadow:0 0 0 0 rgba(255,68,68,0)}}

.ctrl-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;transition:all .2s;flex-shrink:0}
.ctrl-btn:hover{border-color:var(--gold)}.ctrl-btn.on{background:var(--gold-dim);border-color:var(--gold)}

.txt-wrap{background:rgba(10,8,5,.9);border:1px solid var(--border);border-radius:11px;padding:.5rem .8rem;display:none;align-items:flex-end;gap:.45rem;margin-top:.45rem}
.txt-wrap.show{display:flex}.txt-wrap:focus-within{border-color:var(--gold)}
#txt-input{flex:1;background:transparent;border:none;outline:none;color:var(--txt);font-family:'Tajawal',sans-serif;font-size:.875rem;resize:none;max-height:68px;line-height:1.6;direction:rtl}
#txt-input::placeholder{color:var(--muted)}
.txt-send{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold-l));border:none;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.txt-send svg{width:13px;height:13px;fill:#0A0A0A}
.txt-send:disabled{opacity:.38;cursor:not-allowed}

.ep-end-ov{position:absolute;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.2rem;padding:2rem;z-index:50;backdrop-filter:blur(10px)}
.ep-end-ov h3{font-family:'Playfair Display',serif;font-size:1.5rem;text-align:center}
.ep-end-ov p{color:var(--muted);font-size:.875rem;text-align:center}
.btn-ghost{padding:.6rem 2rem;background:transparent;border:1px solid var(--gold);border-radius:10px;color:var(--gold);font-family:'Tajawal',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer}
.btn-ghost:hover{background:var(--gold-dim)}

#overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(5,3,1,.96);align-items:center;justify-content:center;flex-direction:column;gap:1.2rem}
#overlay.show{display:flex}
.spinner{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ov-txt{font-size:.85rem;color:var(--muted)}
</style>
</head>
<body>
<div id="overlay"><div class="spinner"></div><p class="ov-txt" id="ov-txt">جاري التحضير...</p></div>

<!-- ══ WELCOME ══ -->
<div id="s-welcome" class="screen active">
  <div class="logo-wrap">
    <div class="mic-ring"><svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1 17.93V21H9v2h6v-2h-2v-2.07A8 8 0 0 0 20 11h-2a6 6 0 0 1-12 0H4a8 8 0 0 0 7 7.93z"/></svg></div>
    <div class="brand">MIKE</div>
    <div class="brand-sub">AI Podcast Studio</div>
  </div>
  <div class="card">
    <h2>مرحباً بك في الاستوديو</h2>
    <p>استوديو بودكاست تفاعلي — مايك يتكلم معك بصوت بشري وتقدر تقاطعه في أي لحظة.</p>
    <div class="lang-row">
      <button class="lang-btn" onclick="setLang('en')" id="b-en">🇬🇧 English</button>
      <button class="lang-btn on" onclick="setLang('ar')" id="b-ar">🇸🇦 العربية</button>
    </div>
    <label class="field-lbl" id="lbl-name">ما اسمك؟</label>
    <input class="field" id="inp-name" placeholder="أدخل اسمك..." autocomplete="off"/>
    <button class="btn" id="btn-go" onclick="goTopics()" disabled>دخول الاستوديو ✦</button>
  </div>
</div>

<!-- ══ TOPICS ══ -->
<div id="s-topics" class="screen">
  <div class="topics-top">
    <div class="sec-eye">اختر موضوعك</div>
    <h2 class="sec-h" id="h-topics">عن ماذا نتحدث اليوم؟</h2>
    <p class="sec-p">اختر المجال ثم حدّد الموضوع</p>
  </div>
  <div class="cats" id="cats"></div>

<script>

    {id:'create',e:'🎨',n:'Creativity & Design',d:'Design, content, creative industries',s:['Digital content creation','Design & visual identity','Motion graphics','Creativity in the AI era','Personal branding']},
    {id:'self',e:'🧠',n:'Personal Growth',d:'Habits, productivity, learning',s:['Building good habits','Time & energy management','Self-directed learning','Work-life balance','Career transformation']},
    {id:'future',e:'🚀',n:'Future & Society',d:'Trends, shifts, big changes',s:['Smart cities','Changing work culture','Gen Z & the future','Sustainability','Global vs local']},

document.getElementById('inp-name').addEventListener('input',function(){document.getElementById('btn-go').disabled=this.value.trim().length<2;});
document.getElementById('txt-input').addEventListener('input',function(){document.getElementById('txt-send').disabled=this.value.trim().length===0;});

function setLang(l){
  S.lang=l;
  document.getElementById('b-ar').classList.toggle('on',l==='ar');
  document.getElementById('b-en').classList.toggle('on',l==='en');
  document.documentElement.dir=l==='ar'?'rtl':'ltr';
  document.getElementById('inp-name').placeholder=l==='ar'?'أدخل اسمك...':'Enter your name...';
  document.getElementById('lbl-name').textContent=l==='ar'?'ما اسمك؟':"What's your name?";
  document.getElementById('btn-go').textContent=l==='ar'?'دخول الاستوديو ✦':'Enter Studio ✦';
}

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}

function goTopics(){
  S.name=document.getElementById('inp-name').value.trim();
  show('s-topics');renderCats();
  document.getElementById('h-topics').textContent=S.lang==='ar'?`عن ماذا نتحدث، ${S.name}؟`:`What shall we discuss, ${S.name}?`;
}

function renderCats(){
  document.getElementById('cats').innerHTML=CATS[S.lang].map(c=>`<div class="cat" onclick="pickCat('${c.id}')" id="c-${c.id}"><span class="cat-emoji">${c.e}</span><div class="cat-name">${c.n}</div><div class="cat-desc">${c.d}</div></div>`).join('');
}

function pickCat(id){
  S.cat=id;S.topic=null;
  document.querySelectorAll('.cat').forEach(c=>c.classList.remove('on'));
  document.getElementById('c-'+id).classList.add('on');
  const d=CATS[S.lang].find(c=>c.id===id);
  document.getElementById('chips').innerHTML=d.s.map(s=>`<button class="chip" onclick="pickSub(this,'${s.replace(/'/g,"\\'")}')">${s}</button>`).join('');
  document.getElementById('subs').classList.add('show');
  document.getElementById('btn-rec').disabled=true;
  setTimeout(()=>document.getElementById('subs').scrollIntoView({behavior:'smooth',block:'nearest'}),100);
}

function pickSub(el,t){S.topic=t;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');document.getElementById('btn-rec').disabled=false;}

async function startEpisode(){
  showOvl(S.lang==='ar'?'جاري تحضير الاستوديو...':'Preparing the studio...');
  show('s-studio');
  document.getElementById('ep-lbl').textContent=S.topic;
  document.getElementById('lbl-guest').textContent=S.name;
  S.msgs=[];S.qi=0;S.done=false;
  setMic('waiting');
  const opener=S.lang==='ar'
    ?`ابدأ الحلقة. رحّب بضيفك ${S.name} بحرارة واحترافية، عرّف موضوع "${S.topic}" بإيجاز ممتع، ثم اطرح السؤال الأول. جمل قصيرة طبيعية.`
    :`Open the episode. Warmly welcome ${S.name}, briefly introduce "${S.topic}", then ask the first question. Short natural sentences.`;
  S.msgs.push({role:'user',content:opener});
  try{
    const text=await apiChat(S.msgs);
    hideOvl();
    S.msgs.push({role:'assistant',content:text});
    S.qi=1;setTranscript('host','مايك: '+text);updateProg();
    await speakHost(text);
  }catch(e){hideOvl();setTranscript('hint','⚠️ '+e.message);setMic('ready');}
}

function buildSys(){
  if(S.lang==='ar') return `أنت "مايك"، مقدم بودكاست صوتي احترافي. أسلوبك راقٍ دافئ ذكي. تتحدث بالعربية الفصحى البسيطة الطبيعية — مثل محادثة بودكاست حقيقية.
الضيف: ${S.name} | الموضوع: ${S.topic}
قواعد: سؤال واحد فقط. جمل قصيرة طبيعية. تعمّق بذكاء. اجعل الضيف يشعر بأهميته. 6 أسئلة. عند الاختتام: ابدأ بـ [END].`;
  return `You are "Mike," a professional podcast host. Warm, intelligent, natural conversational style.
Guest: ${S.name} | Topic: ${S.topic}
Rules: ONE question per response. Short natural sentences. Go deeper. Make guest feel valued. 6 questions. When closing: start with [END].`;
}

async function speakHost(text){
  stopAudio();S.speaking=true;
  setSpeaking('host');setMic('host-talking');
  setStatus(S.lang==='ar'?'مايك يتحدث... تكلّم لتقاطعه':'Mike is speaking... speak to interrupt');
  const clean=text.replace(/\[END\]/g,'').replace(/\*+/g,'').replace(/\n+/g,' ').trim();
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'tts',text:clean,lang:S.lang})});
    if(!r.ok) throw new Error('TTS error');
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    const audio=new Audio(url);
    S.currentAudio=audio;
    audio.onended=()=>{S.speaking=false;setSpeaking(null);URL.revokeObjectURL(url);if(!S.done){setMic('ready');setStatus(S.lang==='ar'?'تحدّث الآن...':'Your turn...');setTimeout(()=>startVAD(),300);}};
    audio.onerror=()=>{S.speaking=false;setSpeaking(null);setMic('ready');setTimeout(()=>startVAD(),300);};
    audio.play().catch(()=>{S.speaking=false;setSpeaking(null);setMic('ready');setStatus(S.lang==='ar'?'اضغط المايك للبدء':'Tap mic to start');});
    startVAD(true);
  }catch(e){
    S.speaking=false;
    const u=new SpeechSynthesisUtterance(clean);
    u.lang=S.lang==='ar'?'ar-SA':'en-US';u.rate=0.9;
    const vs=window.speechSynthesis.getVoices();
    const v=S.lang==='ar'?vs.find(v=>v.lang.startsWith('ar')):vs.find(v=>v.lang.startsWith('en'));
    if(v)u.voice=v;
    u.onend=()=>{setSpeaking(null);setMic('ready');setTimeout(()=>startVAD(),300);};
    window.speechSynthesis.speak(u);
  }
}

function stopAudio(){if(S.currentAudio){S.currentAudio.pause();S.currentAudio.src='';S.currentAudio=null;}}

let vadRec=null;
function startVAD(interruptMode=false){
  if(vadRec)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setMic('ready');return;}
  vadRec=new SR();
  vadRec.lang=S.lang==='ar'?'ar-SA':'en-US';
  vadRec.continuous=true;vadRec.interimResults=true;
  let finalText='';
  vadRec.onstart=()=>{if(!interruptMode){setMic('listening');setSpeaking('guest');setStatus(S.lang==='ar'?'أنا أسمعك...':'Listening...');}};
  vadRec.onresult=(e)=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)final+=e.results[i][0].transcript;else interim+=e.results[i][0].transcript;}
    if(interruptMode&&(interim||final)){
      stopAudio();window.speechSynthesis.cancel();S.speaking=false;interruptMode=false;
      setSpeaking('guest');setMic('listening');
      setStatus(S.lang==='ar'?'تفضّل، أنا أسمعك...':'Go ahead...');
    }
    setTranscript('guest',`${S.name}: ${final||interim}`);
    if(final){
      finalText+=final+' ';
      clearTimeout(S.vadTimeout);
      S.vadTimeout=setTimeout(()=>{stopVAD();if(finalText.trim())processAnswer(finalText.trim());else{setMic('ready');startVAD();}},1800);
    }
  };
  vadRec.onerror=(e)=>{stopVAD();if(e.error==='not-allowed'){showTextMode();setStatus(S.lang==='ar'?'يرجى السماح بالميكروفون':'Allow microphone');}else if(!interruptMode)setMic('ready');};
  vadRec.onend=()=>{if(vadRec&&!S.waiting&&!S.done&&!interruptMode){try{vadRec.start();}catch(e){}}};
  try{vadRec.start();}catch(e){vadRec=null;}
}

function stopVAD(){clearTimeout(S.vadTimeout);if(vadRec){try{vadRec.stop();}catch(e){}vadRec=null;}S.listening=false;}

function handleMicTap(){
  if(S.done)return;
  if(S.speaking){stopAudio();window.speechSynthesis.cancel();S.speaking=false;setSpeaking(null);stopVAD();setMic('ready');setTimeout(()=>startVAD(),200);return;}
  if(S.waiting)return;
  if(vadRec){stopVAD();setMic('ready');setStatus('');}
  else startVAD();
}

async function processAnswer(text){
  stopVAD();S.waiting=true;setMic('waiting');setSpeaking(null);
  setTranscript('guest',`${S.name}: ${text}`);
  S.msgs.push({role:'user',content:text});
  setStatus(S.lang==='ar'?'مايك يفكر...':'Mike is thinking...');
  try{
    const res=await apiChat(S.msgs);
    S.msgs.push({role:'assistant',content:res});
    const isEnd=res.trimStart().startsWith('[END]');
    if(isEnd){
      S.done=true;const clean=res.replace('[END]','').trim();
      setTranscript('host','مايك: '+clean);updateProg(true);S.waiting=false;
      await speakHost(clean);showEnd();
    }else{
      S.qi=Math.min(S.qi+1,S.total);setTranscript('host','مايك: '+res);updateProg();S.waiting=false;
      await speakHost(res);
    }
  }catch(e){S.waiting=false;setTranscript('hint','⚠️ '+e.message);setMic('ready');setTimeout(()=>startVAD(),500);}
}

function toggleText(){const on=document.getElementById('txt-btn').classList.toggle('on');document.getElementById('txt-wrap').classList.toggle('show',on);if(on)document.getElementById('txt-input').focus();}
function showTextMode(){document.getElementById('txt-btn').classList.add('on');document.getElementById('txt-wrap').classList.add('show');}
function sendText(){const t=document.getElementById('txt-input').value.trim();if(!t||S.waiting)return;document.getElementById('txt-input').value='';autoResize(document.getElementById('txt-input'));stopVAD();processAnswer(t);}
function onEnter(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendText();}}

async function apiChat(messages){
  const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'chat',messages,system:buildSys()})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||r.status);}
  const d=await r.json();return d.text;
}

function setSpeaking(who){
  document.getElementById('chair-host').classList.toggle('speaking',who==='host');
  document.getElementById('chair-guest').classList.toggle('speaking',who==='guest');
  document.getElementById('fig-host').classList.toggle('talking',who==='host');
  document.getElementById('fig-guest').classList.toggle('talking',who==='guest');
}
function setMic(st){document.getElementById('mic-btn').className='big-mic '+st;}
function setTranscript(type,text){const c=type==='host'?'t-host':type==='guest'?'t-guest':'t-hint';document.getElementById('transcript').innerHTML=`<span class="${c}">${text.replace(/\[END\]/g,'').trim()}</span>`;}
function setStatus(t){document.getElementById('status').textContent=t;}
function updateProg(done=false){document.getElementById('prog').style.width=(done?100:Math.round(S.qi/S.total*100))+'%';document.getElementById('q-ctr').textContent=S.lang==='ar'?`س ${toA(S.qi)} / ${toA(S.total)}`:`Q ${S.qi} / ${S.total}`;}
function toA(n){return String(n).replace(/[0-9]/g,d=>'٠١٢٣٤٥٦٧٨٩'[d]);}
function showEnd(){
  const ov=document.createElement('div');ov.className='ep-end-ov';
  ov.innerHTML=`<h3>🎙 ${S.lang==='ar'?'انتهت الحلقة':'Episode Complete'}</h3><p>${S.lang==='ar'?`شكراً ${S.name}، كانت حلقة رائعة!`:`Thank you ${S.name}!`}</p><button class="btn-ghost" onclick="restart()">${S.lang==='ar'?'حلقة جديدة ↺':'New Episode ↺'}</button>`;
  document.getElementById('room').appendChild(ov);
  document.querySelector('.studio-foot').style.display='none';
}
function restart(){
  stopAudio();window.speechSynthesis.cancel();stopVAD();
  S.msgs=[];S.qi=0;S.done=false;S.speaking=false;S.waiting=false;
  document.querySelector('.studio-foot').style.display='';
  document.querySelector('.ep-end-ov')?.remove();
  setSpeaking(null);setMic('waiting');show('s-welcome');
}
function showOvl(t){document.getElementById('ov-txt').textContent=t;document.getElementById('overlay').classList.add('show');}
function hideOvl(){document.getElementById('overlay').classList.remove('show');}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,68)+'px';}
window.speechSynthesis?.getVoices?.();
</script>
</body>
