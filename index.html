<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MIKE — AI Podcast Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C9A84C;--gold-l:#E8C97A;--gold-dim:rgba(201,168,76,.15);
  --bg:#060504;--bg2:#0f0d0a;--bg3:#1a1710;
  --txt:#F0EDE6;--muted:#7a6f62;--border:rgba(201,168,76,.15);--red:#FF4444;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--txt);overflow-x:hidden}
.screen{display:none}
.screen.active{display:flex;flex-direction:column;min-height:100vh}

/* ══ WELCOME ══ */
#s-welcome{align-items:center;justify-content:center;padding:2rem 1.25rem;gap:1.5rem;overflow-y:auto;
  background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.07),transparent 70%)}
.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:.5rem}
.mic-ring{width:72px;height:72px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;animation:pls 3s ease-in-out infinite}
.mic-ring svg{width:32px;height:32px;fill:var(--gold)}
@keyframes pls{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.4)}50%{box-shadow:0 0 0 18px rgba(201,168,76,.04)}}
.brand{font-family:'Playfair Display',serif;font-size:3rem;font-weight:900;letter-spacing:-.02em}
.brand-sub{font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:1.75rem 1.5rem;width:100%;max-width:440px;position:relative}
.card::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:50%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.card h2{font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:.5rem;text-align:center}
.card p{color:var(--muted);font-size:.875rem;line-height:1.7;text-align:center;margin-bottom:1.5rem}
.lang-row{display:flex;gap:.5rem;margin-bottom:1.2rem}
.lang-btn{flex:1;padding:.6rem;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:.875rem;cursor:pointer;transition:all .2s}
.lang-btn.on{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);font-weight:600}
.field-lbl{font-size:.78rem;color:var(--muted);margin-bottom:.3rem;display:block}
.field{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:11px;padding:.8rem 1rem;color:var(--txt);font-family:'Tajawal',sans-serif;font-size:1rem;outline:none;transition:border-color .2s;margin-bottom:1.1rem}
.field:focus{border-color:var(--gold)}.field::placeholder{color:var(--muted)}
.btn{width:100%;padding:.9rem;background:linear-gradient(135deg,var(--gold),var(--gold-l));border:none;border-radius:11px;color:#0A0A0A;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,168,76,.25)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ══ TOPICS ══ */
#s-topics{padding:1.5rem 1.25rem 2rem;gap:1.2rem;overflow-y:auto}
.topics-top{text-align:center}
.sec-eye{font-size:.7rem;color:var(--gold);letter-spacing:.2em;text-transform:uppercase;margin-bottom:.4rem}
.sec-h{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700}
.sec-p{color:var(--muted);font-size:.85rem;margin-top:.3rem}
.cats{display:grid;grid-template-columns:repeat(2,1fr);gap:.7rem}
.cat{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1rem;cursor:pointer;transition:all .2s;text-align:right}
.cat:active{transform:scale(.97)}.cat.on{border-color:var(--gold);background:var(--gold-dim)}
.cat-emoji{font-size:1.6rem;margin-bottom:.3rem;display:block}
.cat-name{font-size:.9rem;font-weight:600;margin-bottom:.15rem;color:var(--txt)}
.cat-desc{font-size:.72rem;color:var(--muted);line-height:1.45}
.subs{display:none}.subs.show{display:block}
.subs-lbl{font-size:.7rem;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;margin-bottom:.5rem}
.chips{display:flex;flex-wrap:wrap;gap:.4rem}
.chip{padding:.42rem .85rem;border-radius:100px;border:1px solid var(--border);background:var(--bg2);color:var(--muted);font-family:'Tajawal',sans-serif;font-size:.8rem;cursor:pointer;transition:all .18s}
.chip:active{transform:scale(.95)}.chip.on{background:var(--gold);border-color:var(--gold);color:#0A0A0A;font-weight:600}

/* ══════════════════════════════════
   STUDIO
══════════════════════════════════ */
#s-studio{height:100vh;min-height:unset;position:fixed;inset:0;overflow:hidden;display:flex;flex-direction:column}
.prog-bar{height:2px;background:#080604;flex-shrink:0}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-l));transition:width .6s;width:0%}

/* THE SCENE */
.scene{
  flex:1;position:relative;overflow:hidden;
}

/* Real photo background */
.scene-bg{
  position:absolute;inset:0;
  background-image:url('https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=1400&q=80&fit=crop');
  background-size:cover;
  background-position:center 30%;
  filter:brightness(.45) saturate(.8);
}
/* Warm color grade overlay */
.scene-grade{
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(80,35,5,.55) 0%,rgba(40,20,5,.3) 50%,rgba(60,30,8,.5) 100%);
  mix-blend-mode:multiply;
}
/* Vignette */
.scene-vignette{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 40%,transparent 30%,rgba(0,0,0,.75) 100%);
}
/* Floor darkness */
.scene-floor{
  position:absolute;bottom:0;left:0;right:0;height:40%;
  background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
}

/* ── CENTER SPOTLIGHT ── */
.center-spot{
  position:absolute;
  top:0;left:50%;transform:translateX(-50%);
  width:500px;height:85%;
  background:radial-gradient(ellipse at 50% 0%,rgba(255,200,80,.06) 0%,transparent 70%);
  pointer-events:none;
}

/* ── CHARACTER SPOTLIGHTS (dynamic) ── */
.char-spot{
  position:absolute;
  width:220px;height:100%;
  top:0;
  pointer-events:none;
  opacity:0;
  transition:opacity .5s ease;
}
.char-spot-left{
  left:10%;
  background:radial-gradient(ellipse at 40% 20%,rgba(255,210,100,.09) 0%,transparent 65%);
}
.char-spot-right{
  right:10%;
  background:radial-gradient(ellipse at 60% 20%,rgba(255,210,100,.09) 0%,transparent 65%);
}
.char-spot.active{opacity:1}

/* ── CHARACTERS (face-to-face silhouettes) ── */
.character{
  position:absolute;
  bottom:0;
  display:flex;flex-direction:column;align-items:center;
  transition:all .4s ease;
}
/* Host on left, facing right */
.char-left{
  left:8%;
  width:200px;
}
/* Guest on right, facing left */
.char-right{
  right:8%;
  width:200px;
}

/* The SVG person */
.person-svg{
  width:100%;
  filter:drop-shadow(0 0 0px transparent);
  transition:filter .5s ease;
}
.character.speaking .person-svg{
  filter:drop-shadow(0 4px 30px rgba(201,168,76,.18));
}

/* Talking body bounce */
.person-svg.talking{animation:ptalk .3s ease-in-out infinite alternate}
@keyframes ptalk{
  from{transform:translateY(0) rotate(0deg)}
  to{transform:translateY(-4px) rotate(.3deg)}
}

/* Name tag */
.char-tag{
  position:absolute;
  bottom:8px;
  background:rgba(0,0,0,.6);
  border:1px solid rgba(201,168,76,.15);
  border-radius:100px;
  padding:.22rem .65rem;
  font-size:.68rem;color:var(--muted);
  letter-spacing:.1em;text-transform:uppercase;
  white-space:nowrap;
  transition:all .4s;
  backdrop-filter:blur(4px);
}
.character.speaking .char-tag{
  color:var(--gold);
  border-color:rgba(201,168,76,.4);
  background:rgba(0,0,0,.75);
}

/* Speaking sound waves */
.sound-waves{
  position:absolute;
  bottom:60px;
  display:flex;align-items:flex-end;gap:3px;
  height:20px;
  opacity:0;transition:opacity .25s;
}
.character.speaking .sound-waves{opacity:1}
.sound-waves span{
  width:3px;border-radius:2px;background:var(--gold);
  animation:sw .5s ease-in-out infinite alternate;
}
.sound-waves span:nth-child(1){height:5px;animation-delay:0s}
.sound-waves span:nth-child(2){height:10px;animation-delay:.07s}
.sound-waves span:nth-child(3){height:16px;animation-delay:.14s}
.sound-waves span:nth-child(4){height:20px;animation-delay:.21s}
.sound-waves span:nth-child(5){height:16px;animation-delay:.28s}
.sound-waves span:nth-child(6){height:10px;animation-delay:.35s}
.sound-waves span:nth-child(7){height:5px;animation-delay:.42s}
@keyframes sw{from{transform:scaleY(.3);opacity:.4}to{transform:scaleY(1);opacity:1}}

/* Mic stands (elegant, floor-standing) */
.mic-stand{
  position:absolute;
  bottom:8px;
  display:flex;flex-direction:column;align-items:center;
}
.char-left .mic-stand{right:20px}
.char-right .mic-stand{left:20px}
.ms-head{
  width:14px;height:14px;border-radius:50%;
  background:radial-gradient(circle,#999,#444);
  box-shadow:0 0 6px rgba(201,168,76,.25),0 2px 4px rgba(0,0,0,.5);
  margin-bottom:0;
}
.ms-arm{
  width:1.5px;height:55px;
  background:linear-gradient(to bottom,#888,#444);
  border-radius:1px;
}
.ms-base{
  width:20px;height:4px;
  background:linear-gradient(90deg,#222,#555,#222);
  border-radius:2px;
  box-shadow:0 2px 4px rgba(0,0,0,.4);
}

/* HUD */
.hud{
  position:absolute;top:0;left:0;right:0;
  padding:.55rem 1rem;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent);
}
.live-pill{display:flex;align-items:center;gap:.3rem;background:rgba(255,68,68,.12);border:1px solid rgba(255,68,68,.3);border-radius:100px;padding:.2rem .6rem;font-size:.65rem;font-weight:700;color:var(--red)}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:blink 1.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.ep-title{font-size:.72rem;color:rgba(255,255,255,.45);text-align:center;font-family:'Playfair Display',serif}
.ep-title b{color:rgba(255,210,100,.75);font-weight:700}
.q-badge{font-size:.68rem;color:var(--muted);background:rgba(0,0,0,.45);border:1px solid var(--border);padding:.18rem .5rem;border-radius:100px}

/* ══ BOTTOM PANEL ══ */
.bottom-panel{
  flex-shrink:0;
  background:linear-gradient(to top,#060504 75%,transparent);
  padding:.55rem 1rem .8rem;
}
.transcript{
  background:rgba(8,6,4,.82);
  border:1px solid rgba(201,168,76,.1);
  border-radius:12px;
  padding:.55rem .9rem;
  min-height:42px;max-height:68px;
  overflow-y:auto;
  font-size:.85rem;line-height:1.65;
  backdrop-filter:blur(8px);
  margin-bottom:.4rem;
}
.transcript::-webkit-scrollbar{width:0}
.t-host{color:#f0ede6}.t-guest{color:var(--gold)}.t-hint{color:var(--muted);font-style:italic;font-size:.78rem}
.status-line{text-align:center;font-size:.7rem;color:var(--muted);margin-bottom:.4rem;min-height:14px}

.ctrl-row{display:flex;align-items:center;justify-content:center;gap:.75rem}

/* MIC button */
.big-mic{
  width:58px;height:58px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  border:none;cursor:pointer;position:relative;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(201,168,76,.3);
  transition:all .2s;
}
.big-mic svg{width:24px;height:24px;fill:#0A0A0A;position:relative;z-index:1;transition:opacity .15s}
.big-mic.host-talking{background:rgba(30,25,15,.9);border:1px solid rgba(201,168,76,.2);box-shadow:none}
.big-mic.host-talking::after{content:'⏸';position:absolute;font-size:1.3rem;color:var(--gold)}
.big-mic.host-talking svg{opacity:0}
.big-mic.listening{background:linear-gradient(135deg,#881111,#CC2222);animation:mpulse 1.1s ease-out infinite;box-shadow:0 0 0 0 rgba(204,34,34,.4)}
.big-mic.waiting{opacity:.35;cursor:not-allowed;box-shadow:none}
@keyframes mpulse{0%{box-shadow:0 0 0 0 rgba(204,34,34,.5)}70%{box-shadow:0 0 0 14px rgba(204,34,34,0)}100%{box-shadow:0 0 0 0 rgba(204,34,34,0)}}

.ctrl-btn{width:42px;height:42px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;transition:all .2s;flex-shrink:0}
.ctrl-btn:hover{border-color:var(--gold);background:var(--gold-dim)}
.ctrl-btn.on{background:var(--gold-dim);border-color:var(--gold)}

.txt-wrap{background:rgba(8,6,4,.9);border:1px solid var(--border);border-radius:12px;padding:.5rem .85rem;display:none;align-items:flex-end;gap:.5rem;margin-top:.45rem}
.txt-wrap.show{display:flex}.txt-wrap:focus-within{border-color:var(--gold)}
#txt-input{flex:1;background:transparent;border:none;outline:none;color:var(--txt);font-family:'Tajawal',sans-serif;font-size:.875rem;resize:none;max-height:68px;line-height:1.6;direction:rtl}
#txt-input::placeholder{color:var(--muted)}
.txt-send{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold-l));border:none;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.txt-send svg{width:13px;height:13px;fill:#0A0A0A}
.txt-send:disabled{opacity:.35;cursor:not-allowed}

/* End overlay */
.ep-end-ov{position:absolute;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.2rem;padding:2rem;z-index:50;backdrop-filter:blur(12px)}
.ep-end-ov h3{font-family:'Playfair Display',serif;font-size:1.6rem;text-align:center}
.ep-end-ov p{color:var(--muted);font-size:.875rem;text-align:center}
.btn-ghost{padding:.65rem 2rem;background:transparent;border:1px solid var(--gold);border-radius:10px;color:var(--gold);font-family:'Tajawal',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer}
.btn-ghost:hover{background:var(--gold-dim)}

/* Loading */
#overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(4,3,2,.97);align-items:center;justify-content:center;flex-direction:column;gap:1.2rem}
#overlay.show{display:flex}
.spinner{width:42px;height:42px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ov-txt{font-size:.85rem;color:var(--muted)}
</style>
</head>
<body>
<div id="overlay"><div class="spinner"></div><p class="ov-txt" id="ov-txt">جاري التحضير...</p></div>

<!-- WELCOME -->
<div id="s-welcome" class="screen active">
  <div class="logo-wrap">
    <div class="mic-ring"><svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1 17.93V21H9v2h6v-2h-2v-2.07A8 8 0 0 0 20 11h-2a6 6 0 0 1-12 0H4a8 8 0 0 0 7 7.93z"/></svg></div>
    <div class="brand">MIKE</div>
    <div class="brand-sub">AI Podcast Studio</div>
  </div>
  <div class="card">
    <h2>مرحباً بك في الاستوديو</h2>
    <p>استوديو بودكاست تفاعلي — مايك يتكلم معك بصوت بشري حقيقي وتقدر تقاطعه في أي لحظة.</p>
    <div class="lang-row">
      <button class="lang-btn" onclick="setLang('en')" id="b-en">🇬🇧 English</button>
      <button class="lang-btn on" onclick="setLang('ar')" id="b-ar">🇸🇦 العربية</button>
    </div>
    <label class="field-lbl" id="lbl-name">ما اسمك؟</label>
    <input class="field" id="inp-name" placeholder="أدخل اسمك..." autocomplete="off"/>
    <button class="btn" id="btn-go" onclick="goTopics()" disabled>دخول الاستوديو ✦</button>
  </div>
</div>

<!-- TOPICS -->
<div id="s-topics" class="screen">
  <div class="topics-top">
    <div class="sec-eye">اختر موضوعك</div>
    <h2 class="sec-h" id="h-topics">عن ماذا نتحدث اليوم؟</h2>
    <p class="sec-p">اختر المجال ثم حدّد الموضوع</p>
  </div>
  <div class="cats" id="cats"></div>
  <div class="subs" id="subs"><div class="subs-lbl">حدّد الموضوع</div><div class="chips" id="chips"></div></div>
  <button class="btn" id="btn-rec" onclick="startEpisode()" disabled>بدء التسجيل 🎙</button>
</div>

<!-- STUDIO -->
<div id="s-studio" class="screen">
  <div class="prog-bar"><div class="prog-fill" id="prog"></div></div>

  <div class="scene" id="scene">
    <!-- Background layers -->
    <div class="scene-bg"></div>
    <div class="scene-grade"></div>
    <div class="scene-vignette"></div>
    <div class="scene-floor"></div>
    <div class="center-spot"></div>

    <!-- Dynamic spotlights -->
    <div class="char-spot char-spot-left" id="spot-left"></div>
    <div class="char-spot char-spot-right" id="spot-right"></div>

    <!-- HOST — left side, facing right -->
    <div class="character char-left" id="char-host">
      <div class="sound-waves"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>

      <svg class="person-svg" id="fig-host" viewBox="0 0 200 380" fill="none">
        <!-- Shadow on floor -->
        <ellipse cx="100" cy="375" rx="55" ry="8" fill="rgba(0,0,0,.5)"/>
        <!-- Legs -->
        <rect x="70" y="260" width="24" height="110" rx="12" fill="#0d0d0d"/>
        <rect x="106" y="260" width="24" height="110" rx="12" fill="#0d0d0d"/>
        <!-- Shoes -->
        <ellipse cx="82" cy="370" rx="18" ry="7" fill="#111" transform="rotate(-5 82 370)"/>
        <ellipse cx="118" cy="370" rx="18" ry="7" fill="#111" transform="rotate(5 118 370)"/>
        <!-- Suit body -->
        <path d="M52 175 Q50 220 55 270 L145 270 Q150 220 148 175 Q135 165 120 160 L100 190 L80 160 Q65 165 52 175Z" fill="#1a1208"/>
        <!-- Suit gradient highlight -->
        <path d="M52 175 Q50 220 55 270 L145 270 Q150 220 148 175 Q135 165 120 160 L100 190 L80 160 Q65 165 52 175Z" fill="url(#sg1)" opacity=".4"/>
        <!-- Shirt -->
        <polygon points="100,165 88,185 100,195 112,185" fill="#f0ede6" opacity=".25"/>
        <!-- Tie -->
        <polygon points="100,168 96,195 100,205 104,195" fill="#C9A84C" opacity=".6"/>
        <!-- Lapels -->
        <polygon points="100,165 78,155 82,185" fill="#252010" opacity=".8"/>
        <polygon points="100,165 122,155 118,185" fill="#252010" opacity=".8"/>
        <!-- Left arm (relaxed) -->
        <path d="M52 178 Q30 200 28 240 Q26 260 38 268 Q50 272 58 258 Q62 240 68 220 Q62 198 52 178Z" fill="#1a1208"/>
        <!-- Right arm (slightly raised — facing guest) -->
        <path d="M148 178 Q168 195 172 230 Q176 255 164 262 Q152 268 144 255 Q138 238 134 215 Q138 196 148 178Z" fill="#1a1208"/>
        <!-- Hands -->
        <ellipse cx="36" cy="268" rx="12" ry="9" fill="#c8946a"/>
        <ellipse cx="162" cy="262" rx="12" ry="9" fill="#c8946a"/>
        <!-- Neck -->
        <rect x="88" y="140" width="24" height="28" rx="10" fill="#c8946a"/>
        <!-- Head -->
        <ellipse cx="100" cy="108" rx="46" ry="52" fill="#c8946a"/>
        <ellipse cx="100" cy="108" rx="46" ry="52" fill="url(#hg1)"/>
        <!-- Hair (short, neat) -->
        <path d="M54 90 Q56 50 100 46 Q144 50 146 90 Q138 70 100 68 Q62 70 54 90Z" fill="#1a0f05"/>
        <ellipse cx="100" cy="60" rx="44" ry="16" fill="#1a0f05"/>
        <!-- Side hair -->
        <path d="M54 90 Q50 100 52 115 Q54 100 62 95Z" fill="#1a0f05"/>
        <path d="M146 90 Q150 100 148 115 Q146 100 138 95Z" fill="#1a0f05"/>
        <!-- Ear left (visible) -->
        <ellipse cx="54" cy="112" rx="9" ry="12" fill="#b87848"/>
        <ellipse cx="54" cy="112" rx="5" ry="8" fill="#c8946a"/>
        <!-- Ear right -->
        <ellipse cx="146" cy="112" rx="9" ry="12" fill="#b87848"/>
        <!-- Earpiece left -->
        <circle cx="54" cy="115" r="4" fill="#C9A84C" opacity=".8"/>
        <!-- Eyes -->
        <ellipse cx="82" cy="105" rx="9" ry="10" fill="#fff"/>
        <ellipse cx="118" cy="105" rx="9" ry="10" fill="#fff"/>
        <!-- Iris -->
        <circle cx="84" cy="107" r="6.5" fill="#3d2010"/>

<script>
const S={name:'',lang:'ar',cat:null,topic:null,msgs:[],qi:0,total:6,speaking:false,waiting:false,done:false,currentAudio:null,vadTimeout:null};
let vadRec=null;

const CATS={
  ar:[
    {id:'tech',e:'💻',n:'التقنية والابتكار',d:'الذكاء الاصطناعي، ريادة الأعمال',s:['الذكاء الاصطناعي في حياتنا','ريادة الأعمال التقنية','مستقبل العمل والأتمتة','التحول الرقمي','بناء التطبيقات والمنتجات']},
    {id:'biz',e:'📈',n:'الأعمال والريادة',d:'النمو، الاستثمار، القيادة',s:['بناء الشركات الناشئة','جذب الاستثمار','القيادة وبناء الفرق','الفشل والنجاح','الفرص في السوق السعودي']},
    {id:'create',e:'🎨',n:'الإبداع والفن',d:'التصميم، المحتوى، الصناعات الإبداعية',s:['صناعة المحتوى الرقمي','التصميم والهوية البصرية','الموشن جرافيك','الإبداع في عصر الذكاء الاصطناعي','بناء البراند الشخصي']},
    {id:'self',e:'🧠',n:'التطوير الذاتي',d:'العادات، الإنتاجية، التعلم',s:['بناء العادات الجيدة','إدارة الوقت والطاقة','التعلم الذاتي','التوازن بين الحياة والعمل','قصة التحول المهني']},
    {id:'future',e:'🚀',n:'المستقبل والمجتمع',d:'رؤية 2030، التغيرات الكبرى',s:['رؤية 2030 وتأثيرها','مستقبل المدن الذكية','ثقافة العمل المتغيرة','جيل Z والمستقبل','الاستدامة والبيئة']},
    {id:'story',e:'✨',n:'قصتك الشخصية',d:'رحلتك، تجاربك، دروسك',s:['رحلتي المهنية','أصعب قرار اتخذته','من أثّر فيّ أكثر','فشلي الأكبر وما تعلمته','حلمي الكبير']},
  ],
  en:[
    {id:'tech',e:'💻',n:'Tech & Innovation',d:'AI, startups, digital future',s:['AI in daily life','Tech entrepreneurship','Future of work','Digital transformation','Building products']},
    {id:'biz',e:'📈',n:'Business & Leadership',d:'Growth, investment, leadership',s:['Building startups','Attracting investment','Leadership & teams','Failure & success','Market opportunities']},
    {id:'create',e:'🎨',n:'Creativity & Design',d:'Design, content, creative industries',s:['Digital content creation','Design & visual identity','Motion graphics','Creativity in AI era','Personal branding']},
    {id:'self',e:'🧠',n:'Personal Growth',d:'Habits, productivity, learning',s:['Building good habits','Time & energy management','Self-directed learning','Work-life balance','Career transformation']},
    {id:'future',e:'🚀',n:'Future & Society',d:'Trends, shifts, big changes',s:['Smart cities','Changing work culture','Gen Z & the future','Sustainability','Global vs local']},
    {id:'story',e:'✨',n:'Your Story',d:'Your journey, experiences, lessons',s:['My professional journey','Hardest decision','Person who shaped me','My biggest failure','My dream']},
  ]
};

document.getElementById('inp-name').addEventListener('input',function(){document.getElementById('btn-go').disabled=this.value.trim().length<2;});
document.getElementById('txt-input').addEventListener('input',function(){document.getElementById('txt-send').disabled=this.value.trim().length===0;});

function setLang(l){S.lang=l;document.getElementById('b-ar').classList.toggle('on',l==='ar');document.getElementById('b-en').classList.toggle('on',l==='en');document.documentElement.dir=l==='ar'?'rtl':'ltr';document.getElementById('inp-name').placeholder=l==='ar'?'أدخل اسمك...':'Enter your name...';document.getElementById('lbl-name').textContent=l==='ar'?'ما اسمك؟':"What's your name?";document.getElementById('btn-go').textContent=l==='ar'?'دخول الاستوديو ✦':'Enter Studio ✦';}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function goTopics(){S.name=document.getElementById('inp-name').value.trim();show('s-topics');renderCats();document.getElementById('h-topics').textContent=S.lang==='ar'?`عن ماذا نتحدث، ${S.name}؟`:`What shall we discuss, ${S.name}?`;}
function renderCats(){document.getElementById('cats').innerHTML=CATS[S.lang].map(c=>`<div class="cat" onclick="pickCat('${c.id}')" id="c-${c.id}"><span class="cat-emoji">${c.e}</span><div class="cat-name">${c.n}</div><div class="cat-desc">${c.d}</div></div>`).join('');}
function pickCat(id){S.cat=id;S.topic=null;document.querySelectorAll('.cat').forEach(c=>c.classList.remove('on'));document.getElementById('c-'+id).classList.add('on');const d=CATS[S.lang].find(c=>c.id===id);document.getElementById('chips').innerHTML=d.s.map(s=>`<button class="chip" onclick="pickSub(this,'${s.replace(/'/g,"\\'")}')">${s}</button>`).join('');document.getElementById('subs').classList.add('show');document.getElementById('btn-rec').disabled=true;setTimeout(()=>document.getElementById('subs').scrollIntoView({behavior:'smooth',block:'nearest'}),100);}
function pickSub(el,t){S.topic=t;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');document.getElementById('btn-rec').disabled=false;}

async function startEpisode(){
  showOvl(S.lang==='ar'?'جاري تحضير الاستوديو...':'Preparing the studio...');
  show('s-studio');
  document.getElementById('ep-lbl').textContent=S.topic;
  document.getElementById('tag-guest').textContent=S.name;
  S.msgs=[];S.qi=0;S.done=false;setMic('waiting');
  const opener=S.lang==='ar'
    ?`ابدأ الحلقة. رحّب بضيفك ${S.name} بحرارة واحترافية، عرّف موضوع "${S.topic}" بإيجاز ممتع، ثم اطرح السؤال الأول. جمل قصيرة طبيعية.`
    :`Open the episode. Warmly welcome ${S.name}, briefly introduce "${S.topic}", then ask the first question. Short natural sentences.`;
  S.msgs.push({role:'user',content:opener});
  try{
    const text=await apiChat(S.msgs);hideOvl();
    S.msgs.push({role:'assistant',content:text});S.qi=1;
    setTranscript('host','مايك: '+text);updateProg();
    await speakHost(text);
  }catch(e){hideOvl();setTranscript('hint','⚠️ '+e.message);setMic('ready');}
}

function buildSys(){
  if(S.lang==='ar') return `أنت "مايك"، مقدم بودكاست صوتي احترافي. أسلوبك راقٍ دافئ ذكي محفّز. تتحدث بالعربية الفصحى البسيطة الطبيعية.
الضيف: ${S.name} | الموضوع: ${S.topic}
قواعد: سؤال واحد فقط في كل رد. جمل قصيرة طبيعية. تعمّق بذكاء. اجعل الضيف يشعر بأهميته وتميّزه. 6 أسئلة. عند الاختتام: ابدأ بـ [END].`;
  return `You are "Mike," a professional podcast host. Warm, intelligent, natural. Guest: ${S.name} | Topic: ${S.topic}. ONE question per response. Short sentences. Go deeper. Make guest feel valued. 6 questions. When closing: start with [END].`;
}

async function speakHost(text){
  stopAudio();S.speaking=true;setSpeaking('host');setMic('host-talking');
  setStatus(S.lang==='ar'?'مايك يتحدث... تكلّم لتقاطعه':'Mike is speaking... speak to interrupt');
  const clean=text.replace(/\[END\]/g,'').replace(/\*+/g,'').replace(/\n+/g,' ').trim();
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'tts',text:clean,lang:S.lang})});
    if(!r.ok)throw new Error('TTS '+(await r.json().catch(()=>({}))).error||r.status);
    const blob=await r.blob();const url=URL.createObjectURL(blob);
    const audio=new Audio(url);S.currentAudio=audio;
    audio.onended=()=>{S.speaking=false;setSpeaking(null);URL.revokeObjectURL(url);if(!S.done){setMic('ready');setStatus(S.lang==='ar'?'تحدّث الآن...':'Your turn...');setTimeout(()=>startVAD(),300);}};
    audio.onerror=()=>{S.speaking=false;setSpeaking(null);setMic('ready');setTimeout(()=>startVAD(),300);};
    audio.play().catch(()=>{S.speaking=false;setSpeaking(null);setMic('ready');setStatus(S.lang==='ar'?'اضغط للبدء':'Tap to start');});
    startVAD(true);
  }catch(e){
    S.speaking=false;
    const u=new SpeechSynthesisUtterance(clean);u.lang=S.lang==='ar'?'ar-SA':'en-US';u.rate=0.9;
    const vs=window.speechSynthesis.getVoices();const v=S.lang==='ar'?vs.find(v=>v.lang.startsWith('ar')):vs.find(v=>v.lang.startsWith('en-GB'))||vs.find(v=>v.lang.startsWith('en'));if(v)u.voice=v;
    u.onend=()=>{setSpeaking(null);setMic('ready');setTimeout(()=>startVAD(),300);};
    window.speechSynthesis.speak(u);
  }
}

function stopAudio(){if(S.currentAudio){S.currentAudio.pause();S.currentAudio.src='';S.currentAudio=null;}}

function startVAD(interruptMode=false){
  if(vadRec)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){setMic('ready');return;}
  vadRec=new SR();vadRec.lang=S.lang==='ar'?'ar-SA':'en-US';vadRec.continuous=true;vadRec.interimResults=true;
  let finalText='';
  vadRec.onstart=()=>{if(!interruptMode){setMic('listening');setSpeaking('guest');setStatus(S.lang==='ar'?'أنا أسمعك...':'Listening...');}};
  vadRec.onresult=(e)=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)final+=e.results[i][0].transcript;else interim+=e.results[i][0].transcript;}
    if(interruptMode&&(interim||final)){
      stopAudio();window.speechSynthesis.cancel();S.speaking=false;interruptMode=false;
      setSpeaking('guest');setMic('listening');setStatus(S.lang==='ar'?'تفضّل، أنا أسمعك...':'Go ahead...');
    }
    setTranscript('guest',`${S.name}: ${final||interim}`);
    if(final){finalText+=final+' ';clearTimeout(S.vadTimeout);S.vadTimeout=setTimeout(()=>{stopVAD();if(finalText.trim())processAnswer(finalText.trim());else{setMic('ready');startVAD();}},1800);}
  };
  vadRec.onerror=(e)=>{stopVAD();if(e.error==='not-allowed'){showTextMode();setStatus(S.lang==='ar'?'يرجى السماح بالميكروفون':'Allow microphone');}else if(!interruptMode)setMic('ready');};
  vadRec.onend=()=>{if(vadRec&&!S.waiting&&!S.done&&!interruptMode){try{vadRec.start();}catch(e){}}};
  try{vadRec.start();}catch(e){vadRec=null;}
}

function stopVAD(){clearTimeout(S.vadTimeout);if(vadRec){try{vadRec.stop();}catch(e){}vadRec=null;}}

function handleMicTap(){
  if(S.done)return;
  if(S.speaking){stopAudio();window.speechSynthesis.cancel();S.speaking=false;setSpeaking(null);stopVAD();setMic('ready');setTimeout(()=>startVAD(),200);return;}
  if(S.waiting)return;
  if(vadRec){stopVAD();setMic('ready');setStatus('');}else startVAD();
}

async function processAnswer(text){
  stopVAD();S.waiting=true;setMic('waiting');setSpeaking(null);
  setTranscript('guest',`${S.name}: ${text}`);S.msgs.push({role:'user',content:text});
  setStatus(S.lang==='ar'?'مايك يفكر...':'Mike is thinking...');
  try{
    const res=await apiChat(S.msgs);S.msgs.push({role:'assistant',content:res});
    const isEnd=res.trimStart().startsWith('[END]');
    if(isEnd){S.done=true;const clean=res.replace('[END]','').trim();setTranscript('host','مايك: '+clean);updateProg(true);S.waiting=false;await speakHost(clean);showEnd();}
    else{S.qi=Math.min(S.qi+1,S.total);setTranscript('host','مايك: '+res);updateProg();S.waiting=false;await speakHost(res);}
  }catch(e){S.waiting=false;setTranscript('hint','⚠️ '+e.message);setMic('ready');setTimeout(()=>startVAD(),500);}
}

function toggleText(){const on=document.getElementById('txt-btn').classList.toggle('on');document.getElementById('txt-wrap').classList.toggle('show',on);if(on)document.getElementById('txt-input').focus();}
function showTextMode(){document.getElementById('txt-btn').classList.add('on');document.getElementById('txt-wrap').classList.add('show');}
function sendText(){const t=document.getElementById('txt-input').value.trim();if(!t||S.waiting)return;document.getElementById('txt-input').value='';autoResize(document.getElementById('txt-input'));stopVAD();processAnswer(t);}
function onEnter(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendText();}}

async function apiChat(messages){
  const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'chat',messages,system:buildSys()})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||r.status);}
  const d=await r.json();return d.text;
}

function setSpeaking(who){
  ['host','guest'].forEach(c=>{
    const id=c==='host'?'char-host':'char-guest';
    const fig=c==='host'?'fig-host':'fig-guest';
    const spot=c==='host'?'spot-left':'spot-right';
    document.getElementById(id).classList.toggle('speaking',who===c);
    document.getElementById(fig).classList.toggle('talking',who===c);
    document.getElementById(spot).classList.toggle('active',who===c);
  });
}
function setMic(st){document.getElementById('mic-btn').className='big-mic '+st;}
function setTranscript(type,text){const c=type==='host'?'t-host':type==='guest'?'t-guest':'t-hint';document.getElementById('transcript').innerHTML=`<span class="${c}">${text.replace(/\[END\]/g,'').trim()}</span>`;}
function setStatus(t){document.getElementById('status').textContent=t;}
function updateProg(done=false){document.getElementById('prog').style.width=(done?100:Math.round(S.qi/S.total*100))+'%';document.getElementById('q-ctr').textContent=S.lang==='ar'?`س ${toA(S.qi)} / ${toA(S.total)}`:`Q ${S.qi} / ${S.total}`;}
function toA(n){return String(n).replace(/[0-9]/g,d=>'٠١٢٣٤٥٦٧٨٩'[d]);}
function showEnd(){const ov=document.createElement('div');ov.className='ep-end-ov';ov.innerHTML=`<h3>🎙 ${S.lang==='ar'?'انتهت الحلقة':'Episode Complete'}</h3><p>${S.lang==='ar'?`شكراً ${S.name}، كانت حلقة رائعة!`:`Thank you ${S.name}!`}</p><button class="btn-ghost" onclick="restart()">${S.lang==='ar'?'حلقة جديدة ↺':'New Episode ↺'}</button>`;document.getElementById('scene').appendChild(ov);document.querySelector('.bottom-panel').style.display='none';}
function restart(){stopAudio();window.speechSynthesis.cancel();stopVAD();S.msgs=[];S.qi=0;S.done=false;S.speaking=false;S.waiting=false;document.querySelector('.bottom-panel').style.display='';document.querySelector('.ep-end-ov')?.remove();setSpeaking(null);setMic('waiting');show('s-welcome');}
function showOvl(t){document.getElementById('ov-txt').textContent=t;document.getElementById('overlay').classList.add('show');}
function hideOvl(){document.getElementById('overlay').classList.remove('show');}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,68)+'px';}
window.speechSynthesis?.getVoices?.();
</script>
</body>
</html>
